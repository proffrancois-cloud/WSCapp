<svg
  id="multiplayer-keycap-h"
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 96 96"
  width="96"
  height="96"
  fill="none"
  role="img"
  aria-label="H keycap"
>
  <defs>
    <style>
      .shadow { fill: #4b2f21; opacity: 0.18; }
      .frame { fill: #5a3726; }
      .body { fill: #ead8b7; stroke: #5a3726; stroke-width: 2.5; vector-effect: non-scaling-stroke; }
      .inner { fill: none; stroke: #d8b13f; stroke-width: 1.25; opacity: 0.95; vector-effect: non-scaling-stroke; }
      .accent { fill: #d8b13f; opacity: 0.95; }
      .letter {
        fill: #6d1f26;
        font-family: Inter, Arial, sans-serif;
        font-size: 38px;
        font-weight: 800;
        text-anchor: middle;
        dominant-baseline: middle;
      }
    </style>
  </defs>

  <rect x="15" y="75" width="66" height="8" rx="4" class="shadow"/>
  <rect x="10" y="10" width="76" height="76" rx="16" class="frame"/>
  <rect x="14" y="14" width="68" height="68" rx="14" class="body"/>
  <rect x="20" y="20" width="56" height="56" rx="11" class="inner"/>
  <rect x="38" y="8" width="20" height="4" rx="2" class="accent"/>
  <text x="48" y="50" class="letter">H</text>
</svg>

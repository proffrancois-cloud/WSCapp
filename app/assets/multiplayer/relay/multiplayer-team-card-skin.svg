  <rect x="30" y="34" width="78" height="78" rx="14" class="panel"/>
  <rect x="38" y="42" width="62" height="62" rx="11" class="inner-line"/>
  <rect x="122" y="34" width="192" height="48" rx="12" class="panel"/>
  <rect x="130" y="42" width="176" height="32" rx="9" class="inner-line"/>
  <rect x="122" y="92" width="192" height="34" rx="10" class="panel"/>

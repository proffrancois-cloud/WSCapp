        fill: #4b2f21;
        opacity: 0.18;
      }

      .frame {
        fill: #5a3726;
      }

      .body {
        fill: #6d1f26;
        stroke: #4b2f21;
        stroke-width: 3;
        vector-effect: non-scaling-stroke;
      }

      .panel {
        fill: #ead8b7;
        stroke: #5a3726;
        stroke-width: 2.5;
        vector-effect: non-scaling-stroke;
      }

      .inner-line {
        fill: none;
        stroke: #c79a2d;
        stroke-width: 1.5;
        opacity: 0.95;
        vector-effect: non-scaling-stroke;
      }

      .accent {
        fill: #d8b13f;
      }

      .accent-soft {

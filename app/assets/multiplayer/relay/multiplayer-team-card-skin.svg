<svg
  id="multiplayer-team-card-skin"
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 360 180"
  width="360"
  height="180"
  fill="none"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">Multiplayer team card skin</title>
  <desc id="desc">
    Reusable team slot card for local multiplayer buzzer mode, with maroon body,
    beige content area, brown structure, and restrained yellow accents.
  </desc>

  <defs>
    <style>

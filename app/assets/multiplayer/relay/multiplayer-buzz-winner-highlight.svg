<svg
  id="multiplayer-buzz-winner-highlight"
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 600 300"
  width="600"
  height="300"
  fill="none"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">Multiplayer buzz winner highlight</title>
  <desc id="desc">
    Premium first-buzz highlight for the winning team card, using maroon, yellow,
    brown, and beige in a restrained academic mini-game style.
  </desc>

  <defs>
    <linearGradient id="focusBand" x1="300" y1="34" x2="300" y2="266" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d8b13f" stop-opacity="0.18"/>
      <stop offset="0.5" stop-color="#ead8b7" stop-opacity="0.1"/>
      <stop offset="1" stop-color="#d8b13f" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="maroonEdge" x1="56" y1="150" x2="544" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6d1f26" stop-opacity="0.18"/>
      <stop offset="0.5" stop-color="#6d1f26" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#6d1f26" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="goldSweep" x1="68" y1="150" x2="532" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d8b13f" stop-opacity="0"/>
      <stop offset="0.16" stop-color="#d8b13f" stop-opacity="0.28"/>
      <stop offset="0.5" stop-color="#f0d98d" stop-opacity="0.4"/>
      <stop offset="0.84" stop-color="#d8b13f" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#d8b13f" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect x="40" y="36" width="520" height="228" rx="34" fill="url(#focusBand)"/>
  <rect x="54" y="50" width="492" height="200" rx="28" fill="url(#maroonEdge)"/>
  <rect x="60" y="56" width="480" height="188" rx="26" stroke="#4b2f21" stroke-width="4" stroke-opacity="0.58"/>
  <rect x="70" y="66" width="460" height="168" rx="24" stroke="#d8b13f" stroke-width="4" stroke-opacity="0.82"/>
  <rect x="82" y="78" width="436" height="144" rx="20" stroke="#ead8b7" stroke-width="2.5" stroke-opacity="0.7"/>

  <path d="M72 150H160" stroke="url(#goldSweep)" stroke-width="12" stroke-linecap="round"/>
  <path d="M440 150H528" stroke="url(#goldSweep)" stroke-width="12" stroke-linecap="round"/>

  <path d="M108 110L150 126" stroke="#d8b13f" stroke-opacity="0.36" stroke-width="6" stroke-linecap="round"/>
  <path d="M98 136L146 144" stroke="#ead8b7" stroke-opacity="0.28" stroke-width="4" stroke-linecap="round"/>
  <path d="M492 110L450 126" stroke="#d8b13f" stroke-opacity="0.36" stroke-width="6" stroke-linecap="round"/>
  <path d="M502 136L454 144" stroke="#ead8b7" stroke-opacity="0.28" stroke-width="4" stroke-linecap="round"/>

  <path d="M108 190L150 174" stroke="#d8b13f" stroke-opacity="0.36" stroke-width="6" stroke-linecap="round"/>
  <path d="M492 190L450 174" stroke="#d8b13f" stroke-opacity="0.36" stroke-width="6" stroke-linecap="round"/>

  <rect x="250" y="28" width="100" height="10" rx="5" fill="#d8b13f" fill-opacity="0.92"/>
  <rect x="270" y="20" width="60" height="6" rx="3" fill="#5a3726" fill-opacity="0.92"/>
  <path d="M270 262H330L320 276H280L270 262Z" fill="#d8b13f" fill-opacity="0.92"/>

  <circle cx="92" cy="92" r="5" fill="#5a3726" fill-opacity="0.34"/>
  <circle cx="508" cy="92" r="5" fill="#5a3726" fill-opacity="0.34"/>
  <circle cx="92" cy="208" r="5" fill="#5a3726" fill-opacity="0.34"/>
  <circle cx="508" cy="208" r="5" fill="#5a3726" fill-opacity="0.34"/>
</svg>

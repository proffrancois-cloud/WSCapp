<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Apocalyptic lyric stimulus</title>
  <desc id="desc">A fake lyric sheet and stage monitor turn world-ending anxiety into a chorus, countdown, and nervous joke.</desc>
  <rect width="1280" height="720" fill="#18171b"/>
  <radialGradient id="glow" cx=".5" cy=".2" r=".75">
    <stop offset="0" stop-color="#7b1f28" stop-opacity=".75"/>
    <stop offset="1" stop-color="#18171b" stop-opacity="0"/>
  </radialGradient>
  <rect width="1280" height="720" fill="url(#glow)"/>
  <g transform="translate(135 88) rotate(-5)">
    <rect width="455" height="560" rx="14" fill="#f6ead6"/>
    <g font-family="Georgia, serif" fill="#241616">
      <text x="44" y="70" font-size="36" font-weight="700">WORLD END CHORUS</text>
      <text x="44" y="126" font-size="25">Tomorrow got cancelled</text>
      <text x="44" y="166" font-size="25">but the beat came early.</text>
      <text x="44" y="224" font-size="25">Clouds count down in 4/4 time,</text>
      <text x="44" y="264" font-size="25">every headline wants a cymbal.</text>
      <text x="44" y="336" font-size="31" font-weight="700">CHORUS:</text>
      <text x="44" y="382" font-size="28">If this is the end,</text>
      <text x="44" y="424" font-size="28">why is there a bridge?</text>
      <text x="44" y="506" font-size="22" fill="#8d2a2f">note: make panic catchy</text>
    </g>
  </g>
  <g transform="translate(657 132)">
    <rect width="470" height="260" rx="24" fill="#111214" stroke="#d34b42" stroke-width="6"/>
    <g stroke="#ffce55" stroke-width="7" stroke-linecap="round">
      <path d="M40 164c25-82 52-82 76 0s52 82 77 0 52-82 77 0 52 82 77 0 52-82 83 0"/>
      <line x1="40" y1="204" x2="430" y2="204" stroke="#6f7981" stroke-width="3"/>
    </g>
    <text x="235" y="76" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#f8e5cc">DOOM MIX</text>
    <text x="235" y="232" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#ffce55">warning or performance?</text>
  </g>
  <g transform="translate(708 452)">
    <circle cx="120" cy="92" r="84" fill="#1f2730" stroke="#d34b42" stroke-width="6"/>
    <path d="M120 42v55l39 24" fill="none" stroke="#ffce55" stroke-width="10" stroke-linecap="round"/>
    <text x="270" y="80" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="900" fill="#f7f0e5">00:90</text>
    <text x="270" y="122" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#d7bfa4">countdown feels real</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1250" viewBox="0 0 1800 1250">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#425466"/>
    </marker>
    <style>
      .title { font: 700 42px Inter, Arial, sans-serif; fill: #1f2a2e; }
      .subtitle { font: 500 18px Inter, Arial, sans-serif; fill: #5e6b70; }
      .room-title { font: 800 17px Inter, Arial, sans-serif; fill: #1f2a2e; }
      .room-sub { font: 600 13px Inter, Arial, sans-serif; fill: #526067; }
      .label { font: 700 12px Inter, Arial, sans-serif; fill: #425466; }
      .small { font: 600 11px Inter, Arial, sans-serif; fill: #526067; }
      .hub { fill: #c2e5ff; stroke: #3dadff; }
      .learn { fill: #c6faf6; stroke: #5ad8cc; }
      .play { fill: #ffe0c2; stroke: #ff9e42; }
      .train { fill: #dcccff; stroke: #874fff; }
      .public { fill: #ffecbd; stroke: #ffc943; }
      .event { fill: #d9d9d9; stroke: #8f8f8f; }
      .line { fill: none; stroke: #425466; stroke-width: 3; marker-end: url(#arrow); }
      .bi { fill: none; stroke: #425466; stroke-width: 3; stroke-dasharray: 8 7; marker-end: url(#arrow); }
      .learn-line { stroke: #189c93; }
      .play-line { stroke: #d66b00; }
      .train-line { stroke: #6c40cc; }
    </style>
  </defs>

  <rect width="1800" height="1250" fill="#f7f5ef"/>
  <text x="70" y="70" class="title">Alpaca Campus Door Plan</text>
  <text x="70" y="105" class="subtitle">Updated topology: Lobby landmarks, connected main hubs, Training Center between Learn and Play, side doors inside Learn and Play.</text>

  <!-- Public spine -->
  <rect x="710" y="150" rx="18" ry="18" width="260" height="92" class="public" stroke-width="3"/>
  <text x="840" y="187" text-anchor="middle" class="room-title">Campus Courtyard</text>
  <text x="840" y="213" text-anchor="middle" class="room-sub">outdoor arrival</text>

  <rect x="700" y="330" rx="18" ry="18" width="280" height="105" class="hub" stroke-width="3"/>
  <text x="840" y="371" text-anchor="middle" class="room-title">School Lobby</text>
  <text x="840" y="399" text-anchor="middle" class="room-sub">central reception</text>

  <rect x="385" y="315" rx="18" ry="18" width="250" height="88" class="public" stroke-width="3"/>
  <text x="510" y="350" text-anchor="middle" class="room-title">Guiding Library</text>
  <text x="510" y="374" text-anchor="middle" class="room-sub">direct lobby door</text>

  <rect x="1045" y="315" rx="18" ry="18" width="250" height="88" class="public" stroke-width="3"/>
  <text x="1170" y="350" text-anchor="middle" class="room-title">Alpaca Cinema</text>
  <text x="1170" y="374" text-anchor="middle" class="room-sub">direct lobby door</text>

  <rect x="710" y="525" rx="18" ry="18" width="260" height="88" class="event" stroke-width="3"/>
  <text x="840" y="560" text-anchor="middle" class="room-title">Grand Amphitheater</text>
  <text x="840" y="584" text-anchor="middle" class="room-sub">direct lobby door</text>

  <path d="M840 242 L840 330" class="line"/>
  <path d="M700 372 L635 360" class="line"/>
  <path d="M980 372 L1045 360" class="line"/>
  <path d="M840 435 L840 525" class="line"/>

  <!-- Main hubs -->
  <rect x="230" y="610" rx="18" ry="18" width="280" height="105" class="learn" stroke-width="3"/>
  <text x="370" y="651" text-anchor="middle" class="room-title">Learning Commons</text>
  <text x="370" y="679" text-anchor="middle" class="room-sub">Learn hub</text>

  <rect x="700" y="650" rx="18" ry="18" width="280" height="105" class="train" stroke-width="3"/>
  <text x="840" y="691" text-anchor="middle" class="room-title">Training Center</text>
  <text x="840" y="719" text-anchor="middle" class="room-sub">bridge hub</text>

  <rect x="1170" y="610" rx="18" ry="18" width="280" height="105" class="play" stroke-width="3"/>

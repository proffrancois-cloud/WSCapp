  <path d="M840 435 L840 650" class="line"/>
  <path d="M920 435 C1070 500 1205 550 1310 610" class="line"/>
  <path d="M510 662 L700 702" class="bi learn-line"/>
  <path d="M980 702 L1170 662" class="bi train-line"/>
  <path d="M510 640 C760 550 980 550 1170 640" class="bi"/>

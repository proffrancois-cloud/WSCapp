  <rect x="1510" y="790" rx="15" ry="15" width="230" height="72" class="play" stroke-width="2"/>
  <text x="1625" y="821" text-anchor="middle" class="room-title">Alpacapardy</text>
  <text x="1625" y="844" text-anchor="middle" class="room-sub">quiz game</text>

  <rect x="1510" y="905" rx="15" ry="15" width="230" height="72" class="play" stroke-width="2"/>
  <text x="1625" y="936" text-anchor="middle" class="room-title">Alpaquiz Relay</text>
  <text x="1625" y="959" text-anchor="middle" class="room-sub">team buzz</text>

  <rect x="1510" y="1020" rx="15" ry="15" width="230" height="72" class="play" stroke-width="2"/>
  <text x="1625" y="1051" text-anchor="middle" class="room-title">Survivalpaca</text>
  <text x="1625" y="1074" text-anchor="middle" class="room-sub">sudden death</text>

  <rect x="1205" y="1020" rx="15" ry="15" width="230" height="72" class="play" stroke-width="2"/>
  <text x="1320" y="1051" text-anchor="middle" class="room-title">Alpaca Run</text>
  <text x="1320" y="1074" text-anchor="middle" class="room-sub">track route</text>

  <rect x="905" y="1020" rx="15" ry="15" width="230" height="72" class="play" stroke-width="2"/>
  <text x="1020" y="1051" text-anchor="middle" class="room-title">Alpaca Jump</text>
  <text x="1020" y="1074" text-anchor="middle" class="room-sub">gym course</text>


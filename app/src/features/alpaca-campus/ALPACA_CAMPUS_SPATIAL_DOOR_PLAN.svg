  <text x="175" y="869" text-anchor="middle" class="room-sub">lesson room</text>

  <rect x="60" y="930" rx="15" ry="15" width="230" height="72" class="learn" stroke-width="2"/>
  <text x="175" y="961" text-anchor="middle" class="room-title">Mind Map Lab</text>
  <text x="175" y="984" text-anchor="middle" class="room-sub">concept lab</text>

  <rect x="60" y="1045" rx="15" ry="15" width="230" height="72" class="learn" stroke-width="2"/>
  <text x="175" y="1076" text-anchor="middle" class="room-title">Flashcard Museum</text>
  <text x="175" y="1099" text-anchor="middle" class="room-sub">card exhibits</text>

  <rect x="370" y="1045" rx="15" ry="15" width="230" height="72" class="learn" stroke-width="2"/>
  <text x="485" y="1076" text-anchor="middle" class="room-title">Raw Classroom</text>
  <text x="485" y="1099" text-anchor="middle" class="room-sub">raw content</text>


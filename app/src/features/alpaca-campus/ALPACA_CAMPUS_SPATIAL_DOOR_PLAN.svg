  <text x="715" y="910" text-anchor="middle" class="room-title">Writing Studio</text>
  <text x="715" y="932" text-anchor="middle" class="room-sub">Train room</text>

  <rect x="860" y="880" rx="15" ry="15" width="210" height="70" class="train" stroke-width="2"/>
  <text x="965" y="910" text-anchor="middle" class="room-title">Bowl Studio</text>
  <text x="965" y="932" text-anchor="middle" class="room-sub">Train room</text>

  <rect x="610" y="980" rx="15" ry="15" width="210" height="70" class="train" stroke-width="2"/>
  <text x="715" y="1010" text-anchor="middle" class="room-title">Challenge Room</text>
  <text x="715" y="1032" text-anchor="middle" class="room-sub">Train room</text>

  <rect x="860" y="980" rx="15" ry="15" width="210" height="70" class="train" stroke-width="2"/>
  <text x="965" y="1010" text-anchor="middle" class="room-title">Debate Lab</text>
  <text x="965" y="1032" text-anchor="middle" class="room-sub">debate selector</text>

  <rect x="860" y="1110" rx="15" ry="15" width="210" height="62" class="train" stroke-width="2"/>
  <text x="965" y="1145" text-anchor="middle" class="room-title">Debate Rooms 1-3</text>

  <path d="M790 755 L715 880" class="line train-line"/>
  <path d="M850 755 L965 880" class="line train-line"/>
  <path d="M810 755 L715 980" class="line train-line"/>
  <path d="M890 755 L965 980" class="line train-line"/>
  <path d="M965 1050 L965 1110" class="line train-line"/>

  <!-- Legend -->
  <rect x="70" y="160" width="430" height="145" rx="14" fill="#ffffff" stroke="#d0c7b4"/>
  <text x="90" y="195" class="room-title">Legend</text>
  <circle cx="100" cy="225" r="8" fill="#c2e5ff" stroke="#3dadff"/>
  <text x="120" y="230" class="small">Blue: central hub</text>
  <circle cx="100" cy="250" r="8" fill="#ffecbd" stroke="#ffc943"/>
  <text x="120" y="255" class="small">Gold: public lobby landmark</text>
  <circle cx="100" cy="275" r="8" fill="#c6faf6" stroke="#5ad8cc"/>
  <text x="120" y="280" class="small">Teal: Learn</text>
  <circle cx="310" cy="225" r="8" fill="#dcccff" stroke="#874fff"/>
  <text x="330" y="230" class="small">Violet: Train</text>
  <circle cx="310" cy="250" r="8" fill="#ffe0c2" stroke="#ff9e42"/>
  <text x="330" y="255" class="small">Orange: Play</text>
  <line x1="300" y1="278" x2="335" y2="278" class="bi"/>
  <text x="345" y="282" class="small">Dashed: two-way side/hub door</text>

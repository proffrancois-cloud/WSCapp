  <path d="M220 887 L220 930" class="bi learn-line"/>
  <path d="M220 1002 L220 1045" class="bi learn-line"/>
  <path d="M290 1081 L370 1081" class="bi learn-line"/>
  <path d="M485 1045 C470 830 470 580 510 403" class="bi learn-line"/>
  <path d="M590 360 L1045 360" class="bi learn-line"/>
  <text x="60" y="790" class="label">Learn side corridor</text>

